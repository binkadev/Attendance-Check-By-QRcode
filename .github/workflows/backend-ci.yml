name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: attendance_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    defaults:
      run:
        working-directory: "backend springboot"

    env:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/attendance_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure MySQL database collation
        run: |
          MYSQL_CONTAINER_ID=$(docker ps --filter "ancestor=mysql:8.0" --format "{{.ID}}" | head -n 1)
          docker exec "$MYSQL_CONTAINER_ID" mysql -uroot -proot -e "ALTER DATABASE attendance_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x ./mvnw

      - name: Run Maven tests
        run: ./mvnw -e -DtrimStackTrace=false test

      - name: Print Surefire reports when tests fail
        if: failure()
        run: |
          echo "===== Surefire report files ====="
          find target/surefire-reports -maxdepth 1 -type f || true

          echo ""
          echo "===== TXT reports ====="
          for file in target/surefire-reports/*.txt; do
            echo ""
            echo "===== $file ====="
            cat "$file" || true
          done

          echo ""
          echo "===== XML reports with errors ====="
          grep -R -n "Caused by\|Exception\|Error creating bean\|Failed to load ApplicationContext\|Access denied\|Communications link failure\|Unknown database\|Flyway\|Illegal mix of collations" target/surefire-reports || true

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: backend springboot/target/surefire-reports/
          if-no-files-found: ignore