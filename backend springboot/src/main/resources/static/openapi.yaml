openapi: 3.0.3
info:
  title: Attendance QR API
  version: 1.0.0
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Me
  - name: Groups
  - name: Members
  - name: Sessions
  - name: QR
  - name: Attendance
  - name: Absence
  - name: Events
  - name: Admin Security

paths:
  /auth/login:
    post:
      tags:
        - Auth
      security: [ ]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '429':
          $ref: '#/components/responses/Err429'

  /auth/refresh:
    post:
      tags:
        - Auth
      security: []
      summary: Refresh access and refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'

  /auth/logout:
    post:
      tags:
        - Auth
      security: []
      summary: Logout current session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      security: []
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '400':
          $ref: '#/components/responses/Err400'

  /auth/reset-password:
    post:
      tags:
        - Auth
      security: []
      summary: Reset password by reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'
        '404':
          $ref: '#/components/responses/Err404'

  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout all active sessions
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /me:
    get:
      tags:
        - Me
      summary: Get current user profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
    patch:
      tags:
        - Me
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /me/absence-requests:
    get:
      tags:
        - Absence
      summary: List my absence requests
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AbsenceRequestStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /absence-requests/{requestId}/revert:
    post:
      tags:
        - Absence
      summary: Revert approved absence request (OWNER/CO_HOST)
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevertAbsenceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'


  /me/attendance/summary:
    get:
      tags:
        - Attendance
      summary: Get current user attendance summary
      description: >
        Source of truth is session_attendance joined with CLOSED attendance_sessions.
        OPEN/CANCELLED sessions are not counted. deleted_at != null sessions are excluded.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSummaryResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
        '422':
          $ref: '#/components/responses/Err422'

  /auth/register:
    post:
      tags:
        - Auth
      security: []
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '409':
          $ref: '#/components/responses/Err409'
  /groups:
    post:
      tags:
        - Groups
      summary: Create group (caller becomes OWNER)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '409':
          $ref: '#/components/responses/Err409'
        '400':
          $ref: '#/components/responses/Err400'
    get:
      tags:
        - Groups
      summary: List my groups
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageGroupResponse'
  /groups/{groupId}:
    get:
      tags:
        - Groups
      summary: Get group details
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
    patch:
      tags:
        - Groups
      summary: Update group (OWNER)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'

  /groups/{groupId}/attendance/summary:
    get:
      tags:
        - Attendance
      summary: Get paged attendance summary of group members (OWNER/CO_HOST)
      description: >
        Returns paged summary for APPROVED members of the group.
        Source of truth is session_attendance joined with CLOSED attendance_sessions.
        OPEN/CANCELLED sessions are not counted. deleted_at != null sessions are excluded.
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAttendanceGroupSummaryResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/archive:
    post:
      tags:
        - Groups
      summary: Archive group (OWNER)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /admin/security/overview:
    get:
      tags:
        - Admin Security
      summary: Security overview dashboard
      parameters:
        - name: hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SecurityOverviewResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /admin/security/password-reset-abuse:
    get:
      tags:
        - Admin Security
      summary: Top password reset abuse sources
      parameters:
        - name: hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityAbuseItem'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /admin/security/login-abuse:
    get:
      tags:
        - Admin Security
      summary: Top login abuse sources
      parameters:
        - name: hours
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 168
            default: 24
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityAbuseItem'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /admin/security/email-outbox:
    get:
      tags:
        - Admin Security
      summary: List retry/dead email outbox items
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SecurityDeadOutboxItem'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/join:
    post:
      tags:
        - Members
      summary: Join group by joinCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JoinGroupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
  /groups/{groupId}/members:
    get:
      tags:
        - Members
      summary: List members (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMemberResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
  /groups/{groupId}/members/{userId}:
    patch:
      tags:
        - Members
      summary: Member action (approve/reject/remove/promote/demote/transfer ownership)
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemberActionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemberResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
        '422':
          $ref: '#/components/responses/Err422'
  /groups/{groupId}/members/me:
    delete:
      tags:
        - Members
      summary: Leave group (MEMBER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
        '422':
          $ref: '#/components/responses/Err422'
  /groups/{groupId}/sessions:
    post:
      tags:
        - Sessions
      summary: Create session (OWNER/CO_HOST)
      description: 'DB enforces one OPEN session per group via UNIQUE KEY uk_as_group_single_open
        (group_id, is_open). V4 adds checkin_open_at/checkin_close_at and CHECK chk_as_checkin_window.

        '
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '409':
          $ref: '#/components/responses/Err409'
        '403':
          $ref: '#/components/responses/Err403'
    get:
      tags:
        - Sessions
      summary: List sessions by group
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SessionStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageSessionResponse'
        '403':
          $ref: '#/components/responses/Err403'
  /groups/{groupId}/sessions/open:
    get:
      tags:
        - Sessions
      summary: Get OPEN session of group (if any)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '404':
          $ref: '#/components/responses/Err404'
  /sessions/{sessionId}:
    get:
      tags:
        - Sessions
      summary: Get session
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
  /sessions/{sessionId}/close:
    post:
      tags:
        - Sessions
      summary: Close session (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseSessionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '409':
          $ref: '#/components/responses/Err409'
        '403':
          $ref: '#/components/responses/Err403'
  /sessions/{sessionId}/cancel:
    post:
      tags:
        - Sessions
      summary: Cancel session (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '403':
          $ref: '#/components/responses/Err403'
  /sessions/{sessionId}/qr/rotate:
    post:
      tags:
        - QR
      summary: Rotate QR token (OWNER/CO_HOST)
      description: 'qr_tokens.token_id VARCHAR(64) ascii_bin PK. token_hash VARBINARY(32)
        UNIQUE uk_qt_token_hash. chk_qt_exp_after_issued: expires_at > issued_at.

        '
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RotateQrRequest'
      responses:
        '200':
          description: OK (plaintext token returned once)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RotateQrResponse'
        '409':
          $ref: '#/components/responses/Err409'
        '403':
          $ref: '#/components/responses/Err403'
  /sessions/{sessionId}/checkin/qr:
    post:
      tags:
        - Attendance
      summary: QR check-in (RULE CHỐT)
      description: "RULE CHỐT: - Reject if now < checkin_open_at  => CHECKIN_NOT_OPEN_YET\
        \ - Reject if now > checkin_close_at => CHECKIN_CLOSED - lateThreshold = checkin_open_at\
        \ + late_after_minutes\n  now <= lateThreshold => PRESENT\n  lateThreshold\
        \ < now <= checkin_close_at => LATE\nDB v6 enforces token belongs to session\
        \ via FK fk_sa_session_qr_token (session_id, qr_token_id)\n  -> qr_tokens(session_id,\
        \ token_id)\n"
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrCheckinRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrCheckinResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '409':
          $ref: '#/components/responses/Err409'
  /sessions/{sessionId}/checkin/reopen:
    post:
      tags:
        - Attendance
      summary: Reopen check-in window (OWNER/CO_HOST)
      description: 'Reopen check-in window for a session. Only OWNER/CO_HOST can perform
        this action. Will reject if another OPEN session already exists in the same
        group.

        '
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReopenCheckinRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReopenCheckinResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
  /sessions/{sessionId}/attendance:
    get:
      tags:
        - Attendance
      summary: List attendance of session (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAttendanceResponse'
        '403':
          $ref: '#/components/responses/Err403'
  /sessions/{sessionId}/attendance/{userId}:
    post:
      tags:
        - Attendance
      summary: Manual mark attendance (OWNER/CO_HOST)
      description: >
        Manual override is allowed only when session.allowManualOverride = true.
        Allowed target statuses: PRESENT, LATE, ABSENT.
        EXCUSED is forbidden here and must go through absence request workflow.
        If current status already equals requested status, operation is a no-op and no audit event is emitted.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualMarkAttendanceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceRecordResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
        '422':
          $ref: '#/components/responses/Err422'
  /sessions/{sessionId}/attendance/{userId}/reset:
    post:
      tags:
        - Attendance
      summary: Reset attendance to ABSENT (OWNER/CO_HOST)
      description: 'Reset one user''s attendance row in a session back to ABSENT.
        Clears check_in_at, qr_token_id, device/ip/userAgent and suspicious flags.

        '
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetAttendanceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
  /sessions/{sessionId}/attendance-events:
    get:
      tags:
        - Events
      summary: List attendance events of session (OWNER/CO_HOST)
      description: 'Return immutable attendance_events rows of a session. Can filter
        by userId and limit.

        '
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceEventsResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
  /groups/{groupId}/absence-requests:
    post:
      tags:
        - Absence
      summary: Create session-scoped absence request
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAbsenceRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
        '422':
          $ref: '#/components/responses/Err422'
    get:
      tags:
        - Absence
      summary: List absence requests (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/AbsenceRequestStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAbsenceResponse'
        '403':
          $ref: '#/components/responses/Err403'
  /absence-requests/{requestId}:
    get:
      tags:
        - Absence
      summary: Get absence request
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
  /absence-requests/{requestId}/review:
    patch:
      tags:
        - Absence
      summary: Review absence request (OWNER/CO_HOST)
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewAbsenceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
        '422':
          $ref: '#/components/responses/Err422'
  /absence-requests/{requestId}/cancel:
    post:
      tags:
        - Absence
      summary: Cancel absence request (requester)
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'
  /sessions/{sessionId}/events:
    get:
      tags:
        - Events
      summary: List session events (OWNER/CO_HOST). attendance_events immutable by
        trigger.
      parameters:
        - $ref: '#/components/parameters/SessionId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/EventType'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEventResponse'
        '403':
          $ref: '#/components/responses/Err403'
  /groups/{groupId}/events:
    get:
      tags:
        - Events
      summary: List group events (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/EventType'
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageEventResponse'
        '403':
          $ref: '#/components/responses/Err403'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    GroupId:
      name: groupId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    Sort:
      name: sort
      in: query
      schema:
        type: string
        example: createdAt,desc
  responses:
    Err400:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            validation:
              value:
                status: 400
                code: VALIDATION_ERROR
                message: Invalid request
    Err401:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            unauthorized:
              value:
                status: 401
                code: UNAUTHORIZED
                message: Missing/invalid token
    Err403:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            forbidden:
              value:
                status: 403
                code: FORBIDDEN
                message: Not allowed
    Err404:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            notFound:
              value:
                status: 404
                code: NOT_FOUND
                message: Resource not found
    Err409:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            conflict:
              value:
                status: 409
                code: CONFLICT
                message: Conflict
    Err422:
      description: Unprocessable Entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            rule:
              value:
                status: 422
                code: BUSINESS_RULE_VIOLATION
                message: Rule violation

    Err429:
      description: Too Many Requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
          examples:
            throttled:
              value:
                status: 429
                code: TOO_MANY_REQUESTS
                message: Too many requests

  schemas:



    WarningLevel:
      type: string
      enum:
        - NONE
        - WARNING_15
        - CRITICAL_20

    RiskLevel:
        type: string
        enum:
          - LOW
          - MEDIUM
          - HIGH

    AttendanceSummaryResponse:
        type: object
        properties:
          totalSessions:
            type: integer
            format: int64
          presentCount:
            type: integer
            format: int64
          lateCount:
            type: integer
            format: int64
          absentCount:
            type: integer
            format: int64
          excusedCount:
            type: integer
            format: int64
          attendancePercent:
            type: number
            format: double
            example: 83.33
          absencePercent:
            type: number
            format: double
            example: 16.67
          warningLevel:
            $ref: '#/components/schemas/WarningLevel'
          riskLevel:
            $ref: '#/components/schemas/RiskLevel'
        required:
          - totalSessions
          - presentCount
          - lateCount
          - absentCount
          - excusedCount
          - attendancePercent
          - absencePercent
          - warningLevel
          - riskLevel

    AttendanceGroupSummaryItem:
        type: object
        properties:
          userId:
            type: string
            format: uuid
          fullName:
            type: string
          email:
            type: string
            format: email
          totalSessions:
            type: integer
            format: int64
          presentCount:
            type: integer
            format: int64
          lateCount:
            type: integer
            format: int64
          absentCount:
            type: integer
            format: int64
          excusedCount:
            type: integer
            format: int64
          attendancePercent:
            type: number
            format: double
          absencePercent:
            type: number
            format: double
          warningLevel:
            $ref: '#/components/schemas/WarningLevel'
          riskLevel:
            $ref: '#/components/schemas/RiskLevel'
        required:
          - userId
          - fullName
          - email
          - totalSessions
          - presentCount
          - lateCount
          - absentCount
          - excusedCount
          - attendancePercent
          - absencePercent
          - warningLevel
          - riskLevel

    PageAttendanceGroupSummaryResponse:
        type: object
        properties:
          items:
            type: array
            items:
              $ref: '#/components/schemas/AttendanceGroupSummaryItem'
          page:
            type: integer
          size:
            type: integer
          totalElements:
            type: integer
            format: int64
          totalPages:
            type: integer
        required:
          - items
          - page
          - size
          - totalElements
          - totalPages
    
    SecurityOverviewResponse:
      type: object
      properties:
        hours:
          type: integer
          example: 24
        passwordResetIssued:
          type: integer
          format: int64
        passwordResetThrottled:
          type: integer
          format: int64
        passwordResetMailFailed:
          type: integer
          format: int64
        loginSuccess:
          type: integer
          format: int64
        loginInvalidCredentials:
          type: integer
          format: int64
        loginThrottled:
          type: integer
          format: int64
        emailOutboxPending:
          type: integer
          format: int64
        emailOutboxRetry:
          type: integer
          format: int64
        emailOutboxDead:
          type: integer
          format: int64
        sessionsRevokedByPasswordReset:
          type: integer
          format: int64
      required:
        - hours
        - passwordResetIssued
        - passwordResetThrottled
        - passwordResetMailFailed
        - loginSuccess
        - loginInvalidCredentials
        - loginThrottled
        - emailOutboxPending
        - emailOutboxRetry
        - emailOutboxDead
        - sessionsRevokedByPasswordReset

    SecurityAbuseItem:
      type: object
      properties:
        source:
          type: string
          example: "203.0.113.10"
        totalCount:
          type: integer
          format: int64
        throttledCount:
          type: integer
          format: int64
      required:
        - source
        - totalCount
        - throttledCount

    SecurityDeadOutboxItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        toEmail:
          type: string
          format: email
        status:
          type: string
          example: "RETRY"
        retryCount:
          type: integer
        lastErrorCode:
          type: string
          nullable: true
        lastErrorMessage:
          type: string
          nullable: true
        nextAttemptAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - toEmail
        - status
        - retryCount
        - nextAttemptAt
        - createdAt

    UpdateMeRequest:
      type: object
      additionalProperties: false
      properties:
        fullName:
          type: string
          minLength: 2
          maxLength: 120
        avatarUrl:
          type: string
          maxLength: 500
    ChangePasswordRequest:
      type: object
      additionalProperties: false
      properties:
        currentPassword:
          type: string
          minLength: 8
          maxLength: 200
        newPassword:
          type: string
          minLength: 8
          maxLength: 200
      required:
        - currentPassword
        - newPassword
    ApiError:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        path:
          type: string
        traceId:
          type: string
      required:
        - timestamp
        - status
        - code
        - message
        - path
    PlatformRole:
      type: string
      enum:
        - ADMIN
        - USER
    UserStatus:
      type: string
      enum:
        - ACTIVE
        - INACTIVE
        - BANNED
    ApprovalMode:
      type: string
      enum:
        - AUTO
        - MANUAL
    GroupStatus:
      type: string
      enum:
        - ACTIVE
        - ARCHIVED
    MemberRole:
      type: string
      enum:
        - OWNER
        - CO_HOST
        - MEMBER
    MemberStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - REMOVED
    SessionStatus:
      type: string
      enum:
        - OPEN
        - CLOSED
        - CANCELLED
    AttendanceStatus:
      type: string
      enum:
        - ABSENT
        - PRESENT
        - LATE
        - EXCUSED
    CheckInMethod:
      type: string
      enum:
        - QR
        - MANUAL
    AbsenceRequestStatus:
      type: string
      enum:
        - PENDING
        - APPROVED
        - REJECTED
        - CANCELLED
        - REVERTED

    EventType:
      type: string
      enum:
        - CHECKIN_QR
        - MARK_MANUAL_PRESENT
        - MARK_MANUAL_LATE
        - MARK_MANUAL_ABSENT
        - MARK_EXCUSED
        - REVERT_FROM_EXCUSED
        - SESSION_OPENED
        - SESSION_CLOSED
        - ABSENCE_REQUEST_CREATED
        - ABSENCE_REQUEST_APPROVED
        - ABSENCE_REQUEST_REJECTED
        - ABSENCE_REQUEST_CANCELLED
        - ABSENCE_REQUEST_REVERTED

    ManualAttendanceOverrideStatus:
      type: string
      enum:
        - ABSENT
        - PRESENT
        - LATE

    LoginRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 190
        password:
          type: string
          minLength: 8
          maxLength: 200
        deviceId:
          type: string
          maxLength: 120
      required:
        - email
        - password
    RefreshRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    LogoutRequest:
      type: object
      additionalProperties: false
      properties:
        refreshToken:
          type: string
      required:
        - refreshToken
    ForgotPasswordRequest:
      type: object
      additionalProperties: false
      properties:
        email:
          type: string
          format: email
          maxLength: 190
      required:
        - email
    ForgotPasswordResponse:
      type: object
      properties:
        message:
          type: string
          example: If the email exists, a password reset link has been sent.
      required:
        - message
    ResetPasswordRequest:
      type: object
      additionalProperties: false
      properties:
        token:
          type: string
          maxLength: 512
        newPassword:
          type: string
          minLength: 8
          maxLength: 200
      required:
        - token
        - newPassword
    LoginUserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        fullName:
          type: string
        avatarUrl:
          type: string
          nullable: true
        platformRole:
          $ref: '#/components/schemas/PlatformRole'
      required:
        - id
        - email
        - fullName
        - platformRole
    TokenResponse:
      type: object
      properties:
        tokenType:
          type: string
          example: Bearer
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        sessionId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/LoginUserSummary'
      required:
        - tokenType
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
        - sessionId
        - user
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 190
        password:
          type: string
          minLength: 8
          maxLength: 200
        fullName:
          type: string
          minLength: 2
          maxLength: 120
        userCode:
          type: string
          maxLength: 40
        deviceId:
          type: string
          maxLength: 120
      required:
        - email
        - password
        - fullName
    RegisterResponse:
      type: object
      properties:
        tokenType:
          type: string
          example: Bearer
        accessToken:
          type: string
        accessTokenExpiresAt:
          type: string
          format: date-time
        refreshToken:
          type: string
        refreshTokenExpiresAt:
          type: string
          format: date-time
        sessionId:
          type: string
          format: uuid
        user:
          $ref: '#/components/schemas/LoginUserSummary'
        firstLogin:
          type: boolean
      required:
        - tokenType
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
        - sessionId
        - user
        - firstLogin
    MeResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
          maxLength: 190
        fullName:
          type: string
          maxLength: 120
        avatarUrl:
          type: string
          maxLength: 500
          nullable: true
        platformRole:
          $ref: '#/components/schemas/PlatformRole'
      required:
        - id
        - email
        - fullName
        - platformRole
    CreateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 150
        code:
          type: string
          maxLength: 20
        joinCode:
          type: string
          minLength: 6
          maxLength: 16
        description:
          type: string
          maxLength: 1000
        semester:
          type: string
          maxLength: 30
        room:
          type: string
          maxLength: 80
        approvalMode:
          $ref: '#/components/schemas/ApprovalMode'
        allowAutoJoinOnCheckin:
          type: boolean
          default: false
      required:
        - name
        - code
        - approvalMode
    UpdateGroupRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 150
        joinCode:
          type: string
          minLength: 6
          maxLength: 16
        description:
          type: string
          maxLength: 1000
        semester:
          type: string
          maxLength: 30
        room:
          type: string
          maxLength: 80
        approvalMode:
          $ref: '#/components/schemas/ApprovalMode'
        allowAutoJoinOnCheckin:
          type: boolean
        status:
          $ref: '#/components/schemas/GroupStatus'
    GroupResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        ownerUserId:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 150
        code:
          type: string
          maxLength: 20
        joinCode:
          type: string
          maxLength: 16
        description:
          type: string
          maxLength: 1000
        semester:
          type: string
          maxLength: 30
        room:
          type: string
          maxLength: 80
        approvalMode:
          $ref: '#/components/schemas/ApprovalMode'
        allowAutoJoinOnCheckin:
          type: boolean
        status:
          $ref: '#/components/schemas/GroupStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - ownerUserId
        - name
        - code
        - joinCode
        - approvalMode
        - status
        - createdAt
        - updatedAt
    JoinGroupRequest:
      type: object
      properties:
        joinCode:
          type: string
          minLength: 6
          maxLength: 16
      required:
        - joinCode
    MemberActionRequest:
      type: object
      properties:
        action:
          type: string
          enum:
            - APPROVE
            - REJECT
            - REMOVE
            - PROMOTE
            - DEMOTE
            - TRANSFER_OWNERSHIP
        note:
          type: string
          maxLength: 500
      required:
        - action
    MemberResponse:
      type: object
      properties:
        groupId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/MemberRole'
        memberStatus:
          $ref: '#/components/schemas/MemberStatus'
        joinedAt:
          type: string
          format: date-time
          nullable: true
        invitedBy:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        removedAt:
          type: string
          format: date-time
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        fullName:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
      required:
        - groupId
        - userId
        - role
        - memberStatus
        - createdAt
        - updatedAt
    CreateSessionRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 150
        startAt:
          type: string
          format: date-time
        endAt:
          type: string
          format: date-time
        timeWindowMinutes:
          type: integer
          minimum: 1
          maximum: 300
          default: 15
        lateAfterMinutes:
          type: integer
          minimum: 1
