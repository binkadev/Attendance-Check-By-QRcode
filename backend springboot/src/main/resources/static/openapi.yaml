openapi: 3.0.3
info:
  title: Attendance QR API
  version: 1.0.0
servers:
  - url: /api/v1
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Me
  - name: Groups
  - name: Members
  - name: Sessions
  - name: QR
  - name: Attendance
  - name: Absence
  - name: Events
  - name: Admin Security
  - name: Notifications
  - name: Fraud
paths:
  /auth/login:
    post:
      tags:
        - Auth
      security: [ ]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '429':
          $ref: '#/components/responses/Err429'

  /auth/refresh:
    post:
      tags:
        - Auth
      security: []
      summary: Refresh access and refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'

  /auth/logout:
    post:
      tags:
        - Auth
      security: []
      summary: Logout current session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'

  /auth/forgot-password:
    post:
      tags:
        - Auth
      security: []
      summary: Request password reset link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForgotPasswordResponse'
        '400':
          $ref: '#/components/responses/Err400'

  /auth/reset-password:
    post:
      tags:
        - Auth
      security: []
      summary: Reset password by reset token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'
        '404':
          $ref: '#/components/responses/Err404'

  /auth/logout-all:
    post:
      tags:
        - Auth
      summary: Logout all active sessions
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /me:
    get:
      tags:
        - Me
      summary: Get current user profile
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
    patch:
      tags:
        - Me
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /me/classes:
    get:
      tags:
        - Me
      summary: List my classes for mobile class screen
      description: >
        Mobile self-read endpoint for class cards.
        Supports quick search by group name, legacy code, course code, class code, lecturer name.
        Supports filter by semester and academicYear.
        Representative session time selection rule:
        prefer OPEN non-deleted session;
        if none, nearest upcoming non-deleted non-cancelled session;
        if none, latest past non-deleted non-cancelled session.
      parameters:
        - name: q
          in: query
          required: false
          description: Quick search by group name, legacy code, course code, class code, lecturer name
          schema:
            type: string
            maxLength: 150
        - name: scope
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MyClassScope'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/GroupStatus'
        - name: memberStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MemberStatus'
        - name: semester
          in: query
          required: false
          description: Semester filter from class_groups.semester
          schema:
            type: string
            maxLength: 30
        - name: academicYear
          in: query
          required: false
          description: Academic year filter from class_groups.academic_year
          schema:
            type: string
            maxLength: 30
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 20
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/MyClassSortBy'
        - name: sortDir
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LowercaseSortDirection'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageMyClassResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'

  /me/classes/semesters:
    get:
      tags:
        - Me
      summary: List distinct semester options for my class dropdown
      description: >
        Returns distinct semester + academicYear options from classes visible to current user
        using the same access visibility as /me/classes with scope ALL.
        Items with both semester and academicYear blank are excluded.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MyClassSemesterOptionResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /me/notifications:
    get:
      tags:
        - Notifications
      summary: List my notifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: unreadOnly
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NotificationType'
        - name: severity
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NotificationSeverity'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageNotificationResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'

  /me/notifications/unread-count:
    get:
      tags:
        - Notifications
      summary: Get my unread notification count
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationUnreadCountResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /me/notifications/{notificationId}/read:
    post:
      tags:
        - Notifications
      summary: Mark one notification as read
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /me/notifications/read-all:
    post:
      tags:
        - Notifications
      summary: Mark all my notifications as read
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationReadAllResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /me/absence-requests:
    get:
      tags:
        - Absence
      summary: List my absence requests
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AbsenceRequestStatus'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /absence-requests/{requestId}/revert:
    post:
      tags:
        - Absence
      summary: Revert approved absence request (OWNER/CO_HOST)
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevertAbsenceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AbsenceResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'


  /me/attendance/summary:
    get:
      tags:
        - Attendance
      summary: Get current user attendance summary
      description: >
        Source of truth is session_attendance joined with CLOSED attendance_sessions.
        OPEN/CANCELLED sessions are not counted. deleted_at != null sessions are excluded.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendanceSummaryResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change current user password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'
        '422':
          $ref: '#/components/responses/Err422'

  /auth/register:
    post:
      tags:
        - Auth
      security: []
      summary: Register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '409':
          $ref: '#/components/responses/Err409'
  /groups:
    post:
      tags:
        - Groups
      summary: Create group (caller becomes OWNER)
      description: >
        Create a new class/group owned by current authenticated user.
        Caller is automatically created as APPROVED OWNER member.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '409':
          $ref: '#/components/responses/Err409'
    get:
      tags:
        - Groups
      summary: List my groups
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageGroupResponse'
        '401':
          $ref: '#/components/responses/Err401'

  /groups/{groupId}:
    get:
      tags:
        - Groups
      summary: Get group details
      description: >
        Return full class/group detail for group form/detail screen.
        Approved group members can view this endpoint. OWNER/CO_HOST/MEMBER are allowed if memberStatus is APPROVED.
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
    patch:
      tags:
        - Groups
      summary: Update group (OWNER/CO_HOST)
      description: >
        Partial update for class/group form.
        If weeklySchedules is provided, existing schedules are fully replaced.
        Only APPROVED OWNER or CO_HOST can update this endpoint.
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'
        '409':
          $ref: '#/components/responses/Err409'

  /groups/{groupId}/status:
    patch:
      tags:
        - Groups
      summary: Update group status (OWNER)
      description: >
        Update group status using production-like status flow.
        Supported statuses are ACTIVE and ARCHIVED.
        Only APPROVED OWNER can change status.
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupStatusRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '400':
          $ref: '#/components/responses/Err400'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/archive:
    post:
      tags:
        - Groups
      summary: Archive group (OWNER)
      description: >
        Compatibility endpoint that archives a group by setting status to ARCHIVED.
        Only APPROVED OWNER can archive.
      deprecated: true
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/fraud-incidents:
    get:
      tags:
        - Fraud
      summary: List fraud incidents of a group
      operationId: listFraudIncidents
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: status
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FraudIncidentStatus'
          style: form
          explode: true
        - name: type
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FraudIncidentType'
          style: form
          explode: true
        - name: severity
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FraudIncidentSeverity'
          style: form
          explode: true
        - name: assignedToUserId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: sortBy
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/FraudIncidentSortBy'
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        '200':
          description: Fraud incidents page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageFraudIncidentResponse'

  /groups/{groupId}/fraud-incidents/{incidentId}:
    get:
      tags:
        - Fraud
      summary: Get fraud incident detail
      operationId: getFraudIncidentDetail
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Fraud incident detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudIncidentResponse'
    patch:
      tags:
        - Fraud
      summary: Update fraud incident status
      operationId: patchFraudIncident
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: incidentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchFraudIncidentRequest'
      responses:
        '200':
          description: Updated fraud incident
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FraudIncidentResponse'

  /groups/{groupId}/notifications:
    get:
      tags:
        - Notifications
      summary: List notifications of current user in a group
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageNotificationResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/attendance-policy:
    get:
      tags: [ Attendance ]
      summary: Get effective attendance policy of group (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePolicyResponse'
        '401': { $ref: '#/components/responses/Err401' }
        '403': { $ref: '#/components/responses/Err403' }
        '404': { $ref: '#/components/responses/Err404' }
    put:
      tags: [ Attendance ]
      summary: Upsert attendance policy of group (OWNER)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttendancePolicyRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttendancePolicyResponse'
        '401': { $ref: '#/components/responses/Err401' }
        '403': { $ref: '#/components/responses/Err403' }
        '404': { $ref: '#/components/responses/Err404' }
        '409': { $ref: '#/components/responses/Err409' }
        '422': { $ref: '#/components/responses/Err422' }
    delete:
      tags: [ Attendance ]
      summary: Reset custom policy back to application defaults (OWNER)
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '204':
          description: No Content
        '401': { $ref: '#/components/responses/Err401' }
        '403': { $ref: '#/components/responses/Err403' }
        '404': { $ref: '#/components/responses/Err404' }
        '409': { $ref: '#/components/responses/Err409' }

  /groups/{groupId}/attendance-policy/students:
    get:
      tags:
        - Attendance
      summary: Get paged attendance policy status of APPROVED group members (OWNER/CO_HOST)
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: q
          in: query
          required: false
          schema:
            type: string
            maxLength: 120
        - name: sortBy
          in: query
          required: false
          schema:
            type: string
            enum: [ fullName, email, joinedAt ]
            default: fullName
        - name: sortDir
          in: query
          required: false
          schema:
            type: string
            enum: [ asc, desc ]
            default: asc
        - name: policyStatus
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/AttendancePolicyStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAttendancePolicyStudentStatusResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/me/attendance-policy-status:
    get:
      tags:
        - Attendance
      summary: Get my attendance policy status in a group
      parameters:
        - $ref: '#/components/parameters/GroupId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyAttendancePolicyStatusResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /groups/{groupId}/attendance/summary:
    get:
      tags:
        - Attendance
      summary: Get paged attendance summary of group members (OWNER/CO_HOST)
      description: >
        Returns paged summary for APPROVED members of the group.
        Source of truth is session_attendance joined with CLOSED attendance_sessions.
        OPEN/CANCELLED sessions are not counted. deleted_at != null sessions are excluded.
      parameters:
        - $ref: '#/components/parameters/GroupId'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageAttendanceGroupSummaryResponse'
        '401':
          $ref: '#/components/responses/Err401'
        '403':
          $ref: '#/components/responses/Err403'
        '404':
          $ref: '#/components/responses/Err404'

  /admin/notification-deliveries:
    get:
      tags:
        - Notifications
      summary: List notification deliveries for admin
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - name: channel
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/NotificationChannel'
        - name: status
          in: query
          required: false
          schema:
