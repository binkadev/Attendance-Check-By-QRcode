spring:
  task:
    scheduling:
      enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    url: jdbc:mysql://localhost:3306/qr_attendance_test?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate.transaction.jta.platform: org.hibernate.engine.transaction.jta.platform.internal.NoJtaPlatform
      hibernate.jdbc.time_zone: UTC
      hibernate.format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration,classpath:db/seed
    baseline-on-migrate: false
    validate-on-migrate: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s

logging:
  level:
    org.flywaydb: INFO

app:
  jwt:
    secret: test-secret-test-secret-test-secret-123456
    access-token-ttl-minutes: 15
    refresh-token-ttl-days: 30

  email:
    outbox:
      enabled: false

  mail:
    from-address: no-reply@test.local

attendance:
  policy:
    defaults:
      late-weight: 1.0
      warning-below-rate: 85.0
      critical-below-rate: 80.0
      warning-absent-count: ~
      critical-absent-count: ~