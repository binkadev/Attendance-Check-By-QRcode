services:
  web-app:
    image: node:22-alpine
    container_name: qr_attendance_web
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./UniPortalAttendWeb:/app
      - web_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend-app

volumes:
  web_node_modules: