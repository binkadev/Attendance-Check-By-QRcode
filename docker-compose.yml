# version: '3.8' (Đã deprecate ở các bản Docker mới, bạn có thể bỏ dòng này)

services:
  # Container cho Database MySQL
  mysql-db:
    image: mysql:8.0
    container_name: qr_attendance_db
    environment:
      MYSQL_DATABASE: qr_attendance_dev
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # KHẮC PHỤC 1: Thêm Container cho Redis
  redis-cache:
    image: redis:7-alpine
    container_name: qr_attendance_redis
    ports:
      - "6379:6379"

  # Container cho Spring Boot Backend
  backend-app:
    build:
      context: "./backend springboot"
      dockerfile: Dockerfile
    container_name: qr_attendance_backend
    ports:
      - "0.0.0.0:8081:8081"
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_started # KHẮC PHỤC 2: Backend phải chờ Redis khởi động
    environment:
      - SERVER_PORT=8081
      - SERVER_ADDRESS=0.0.0.0

      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/qr_attendance_dev?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456

      # KHẮC PHỤC 3: Ghi đè biến môi trường, trỏ host của redis về tên container 'redis-cache'
      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_DATA_REDIS_PORT=6379

volumes:
  db_data: